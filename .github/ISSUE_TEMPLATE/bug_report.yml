name: Bug report
description: Report a reproducible problem in Barefoot Blender.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please provide enough detail so we can reproduce and fix it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Enter ...
        3. Click ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error text if applicable.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where are you running Barefoot Blender?
      options:
        - Web (PWA/browser)
        - iOS (native app)
        - Android (native app)
        - Other
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Version number if known (for example, from package/app build).
      placeholder: 0.8.0
  - type: input
    id: browser-device
    attributes:
      label: Browser/device details
      description: Browser and OS version, or phone model/OS version.
      placeholder: Chrome 125 on macOS 14 / iPhone 15 iOS 18
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, recordings, logs, or anything else that might help.
