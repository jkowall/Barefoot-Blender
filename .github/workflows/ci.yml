name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build web app
        run: npm run build

  android-native:
    name: Android native smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Android project
        run: npx cap sync android

      - name: Check Capacitor environment
        run: npx cap doctor android

      - name: Run Android unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

  ios-compile:
    name: iOS compile smoke
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Check Capacitor environment
        run: npx cap doctor ios

      - name: Build iOS app without signing
        run: |
          set -euo pipefail
          SIMULATOR_UDID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && /Shutdown|Booted/ { print $2; exit }')"
          if [[ -z "${SIMULATOR_UDID}" ]]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${SIMULATOR_UDID}" \
            CODE_SIGNING_ALLOWED=NO \
            build
