name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "24 9 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-static:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - javascript-typescript

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Typecheck native Swift sources for CodeQL
        run: |
          set -euo pipefail
          STUB_DIR="$(mktemp -d)"
          trap 'rm -rf "${STUB_DIR}"' EXIT

          cat > "${STUB_DIR}/Capacitor.swift" <<'SWIFT'
          import UIKit

          public final class ApplicationDelegateProxy {
              public static let shared = ApplicationDelegateProxy()

              public func application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return false
              }

              public func application(_ application: UIApplication, continue userActivity: NSUserActivity, restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return false
              }
          }
          SWIFT

          SDK_PATH="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          SIMULATOR_ARCH="$(uname -m)"
          SWIFT_TARGET="${SIMULATOR_ARCH}-apple-ios15.0-simulator"

          swiftc \
            -emit-module \
            -module-name Capacitor \
            -parse-as-library \
            -sdk "${SDK_PATH}" \
            -target "${SWIFT_TARGET}" \
            "${STUB_DIR}/Capacitor.swift" \
            -emit-module-path "${STUB_DIR}/Capacitor.swiftmodule"

          swiftc \
            -typecheck \
            -parse-as-library \
            -sdk "${SDK_PATH}" \
            -target "${SWIFT_TARGET}" \
            -I "${STUB_DIR}" \
            ios/App/App/AppDelegate.swift \
            ios/App/CapApp-SPM/Sources/CapApp-SPM/CapApp-SPM.swift

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:swift
